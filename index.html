<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>猫猫的幼儿园故事</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F0E8;--card:#FFFDF8;
  --green:#4A7A5A;--green-l:#E8F5EC;
  --amber:#C8963A;--amber-l:#FDF5E6;
  --blue:#5A8FA8;--blue-l:#EAF4F8;
  --pink:#C06080;--pink-l:#FDE8EF;
  --purple:#7A5AA8;--purple-l:#F0EAF8;
  --text:#3A3226;--text2:#8A7A6A;
  --shadow:0 4px 20px rgba(60,50,38,0.10);
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}

/* ── 顶栏 ── */
.topbar{background:var(--green);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{color:#fff;font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.topbar-sub{color:rgba(255,255,255,0.8);font-size:12px}

/* ── 屏幕 ── */
.screen{display:none}.screen.on{display:block}
.wrap{max-width:480px;margin:0 auto;padding:16px 16px 100px}

/* ── 封面 ── */
.cover-hero{text-align:center;padding:30px 20px 20px}
.cover-emoji{font-size:80px;animation:bob 2.5s ease-in-out infinite;display:block;margin-bottom:12px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.cover-title{font-size:28px;font-weight:900;color:var(--green);margin-bottom:6px}
.cover-sub{font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:20px}

/* ── 故事列表 ── */
.phase-title{font-size:12px;font-weight:800;color:var(--text2);padding:12px 4px 6px;letter-spacing:1px;text-transform:uppercase}
.lesson-card{background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.15s;border-left:4px solid transparent}
.lesson-card:active{transform:scale(0.97)}
.lesson-card.phase1{border-left-color:#C8963A}
.lesson-card.phase2{border-left-color:#5A8FA8}
.lesson-card.phase3{border-left-color:#7A5AA8}
.lesson-card.phase4{border-left-color:#4A7A5A}
.lesson-card.phase5{border-left-color:#C06080}
.lesson-card.phase6{border-left-color:#C8963A}
.lesson-num{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;color:white}
.lesson-info .name{font-size:15px;font-weight:800;color:var(--text)}
.lesson-info .sub{font-size:12px;color:var(--text2);margin-top:2px}
.lesson-info .emotion{font-size:11px;font-weight:700;margin-top:3px}

/* ── 播放页 ── */
.story-header{background:var(--green);padding:14px 18px;display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:rgba(255,255,255,0.9);font-size:15px;font-weight:800;cursor:pointer;padding:0}
.story-title{color:#fff;font-size:16px;font-weight:800;flex:1}
.story-phase{background:rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}

/* ── 进度条 ── */
.story-progress{background:rgba(255,255,255,0.3);height:4px}
.story-progress-fill{height:100%;background:rgba(255,255,255,0.8);transition:width 0.5s ease;width:0%}

/* ── 当前段落显示 ── */
.story-player{background:var(--card);margin:16px;border-radius:20px;padding:0;overflow:hidden;box-shadow:var(--shadow)}

.seg-header{padding:14px 18px 0;display:flex;align-items:center;gap:10px}
.seg-role-icon{font-size:28px;flex-shrink:0}
.seg-role-name{font-size:13px;font-weight:800}
.seg-role-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:2px;display:inline-block}

.seg-text{padding:14px 18px;font-size:17px;font-weight:600;line-height:1.8;color:var(--text)}
.seg-text.narrator{font-size:15px;color:var(--text2);font-style:italic;font-weight:400}
.seg-text.english{font-size:22px;font-weight:900;letter-spacing:1px;color:var(--blue);background:var(--blue-l);padding:12px 18px;margin:0;border-radius:0}

/* ── 波形 ── */
.wave-bar{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:32px;padding:0 18px 10px}
.wb{width:6px;border-radius:3px;height:4px;background:var(--green);opacity:0.5}
.wave-bar.playing .wb:nth-child(1){animation:wa 0.5s infinite alternate}
.wave-bar.playing .wb:nth-child(2){animation:wb2 0.4s infinite alternate}
.wave-bar.playing .wb:nth-child(3){animation:wc 0.6s infinite alternate}
.wave-bar.playing .wb:nth-child(4){animation:wb2 0.45s infinite alternate}
.wave-bar.playing .wb:nth-child(5){animation:wa 0.55s infinite alternate}
.wave-bar.playing .wb:nth-child(6){animation:wc 0.5s infinite alternate}
@keyframes wa{to{height:24px;opacity:1}}@keyframes wb2{to{height:18px;opacity:1}}@keyframes wc{to{height:12px;opacity:1}}

/* ── 控制区 ── */
.story-controls{padding:12px 16px 16px;display:flex;gap:10px}
.ctrl-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;transition:transform 0.1s;display:flex;align-items:center;justify-content:center;gap:6px}
.ctrl-btn:active{transform:scale(0.96)}
.btn-play{background:linear-gradient(135deg,var(--green),#3A6A48);box-shadow:0 4px 14px rgba(74,122,90,0.3)}
.btn-pause{background:linear-gradient(135deg,var(--amber),#A07020)}
.btn-prev{flex:0 0 auto;padding:14px 16px;background:linear-gradient(135deg,#8A8A7A,#6A6A5A)}
.btn-next{flex:0 0 auto;padding:14px 16px;background:linear-gradient(135deg,var(--blue),#3A6F88)}

/* ── 段落列表 ── */
.seg-list{margin:0 16px 16px}
.seg-item{padding:10px 14px;border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;display:flex;gap:10px;align-items:flex-start;border:2px solid transparent}
.seg-item.active{border-color:var(--green);background:var(--green-l)}
.seg-item.done{opacity:0.5}
.seg-item-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.seg-item-text{font-size:13px;line-height:1.5;color:var(--text)}
.seg-item.en .seg-item-text{color:var(--blue);font-weight:700}

/* ── 完成卡 ── */
.finish-card{background:linear-gradient(135deg,#C8963A,#A07020);border-radius:20px;padding:24px 20px;margin:16px;text-align:center;color:#fff;display:none}
.finish-card.show{display:block}
.finish-card h3{font-size:22px;margin:10px 0 6px}
.finish-card p{font-size:14px;opacity:0.9;line-height:1.6}
.finish-review{background:var(--card);border-radius:16px;margin:16px;padding:16px}
.review-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px}
.review-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0E8D8;font-size:14px}
.review-item:last-child{border-bottom:none}
.review-zh{color:var(--text2)}
.review-en{color:var(--blue);font-weight:700}

/* ── 加载 ── */
.loading-line{height:3px;background:var(--green-l);overflow:hidden;display:none}
.loading-line.on{display:block}
.loading-fill{height:100%;background:var(--green);animation:loading 1.5s ease-in-out infinite}
@keyframes loading{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

/* ── 角色颜色 ── */
.wechat-tip{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;color:#fff;text-align:center;padding:30px;
}
.wechat-tip h2{font-size:24px;font-weight:900;margin-bottom:10px}
.wechat-tip p{font-size:15px;opacity:0.9;line-height:1.7;margin-bottom:16px}
.wechat-arrow{font-size:22px;font-weight:900;color:#FFD93D;margin-bottom:6px}
.wechat-btn{background:#4A7A5A;color:#fff;border:none;border-radius:16px;
  padding:14px 28px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px}
.wechat-skip{background:none;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;padding:8px 20px;font-size:13px;cursor:pointer;margin-top:10px}

.role-narrator{color:var(--text2)}
.role-mum{color:var(--pink)}
.role-koko{color:var(--green)}
.role-meimei{color:var(--purple)}
.role-doudou{color:var(--blue)}
.role-dingding{color:var(--amber)}
.role-teacher{color:#5A7A3A}
.role-evan{color:var(--amber)}

.badge-narrator{background:var(--bg);color:var(--text2)}
.badge-mum{background:var(--pink-l);color:var(--pink)}
.badge-koko{background:var(--green-l);color:var(--green)}
.badge-meimei{background:var(--purple-l);color:var(--purple)}
.badge-doudou{background:var(--blue-l);color:var(--blue)}
.badge-dingding{background:var(--amber-l);color:var(--amber)}
.badge-teacher{background:#E8F5E8;color:#5A7A3A}
.badge-evan{background:var(--amber-l);color:var(--amber)}
</style>
</head>
<body>

<!-- ══ 微信检测弹窗 ══ -->
<div id="locked-tip" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:16px 28px;border-radius:16px;font-size:15px;z-index:9999;text-align:center;pointer-events:none">
  🔒 敬请期待，即将开放
</div>
<div class="wechat-tip" id="wechat-tip" style="display:none">
  <div style="font-size:56px;margin-bottom:14px">🐱</div>
  <h2>请用浏览器打开</h2>
  <p>微信内置浏览器限制音频播放<br>需要用手机浏览器才能听到故事声音</p>
  <div class="wechat-arrow">👆 点右上角 ···</div>
  <div style="font-size:20px;font-weight:900;color:#FFD93D;margin-bottom:16px">选"在浏览器中打开"</div>
  <button class="wechat-btn" onclick="dismissTip()">我已在浏览器中，继续</button>
  <br>
  <button class="wechat-skip" onclick="dismissTip()">忽略，继续使用</button>
</div>

<!-- ══ 故事列表 ══ -->
<div class="screen on" id="s-list">
  <div class="topbar">
    <div>
      <div class="topbar-title">🐱 猫猫的幼儿园故事</div>
      <div class="topbar-sub">20集 · 沉浸式中英双语故事</div>
    </div>
  </div>
  <div class="wrap">
    <div class="cover-hero">
      <span class="cover-emoji">🐱</span>
      <div class="cover-title">猫猫的幼儿园故事</div>
      <div class="cover-sub">跟着小花猫猫猫，<br>从害怕到喜欢幼儿园，<br>一起学英语，一起长大。</div>
    </div>
    <div id="lesson-list"></div>
  </div>
</div>

<!-- ══ 故事播放页 ══ -->
<div class="screen" id="s-play">
  <div class="story-header">
    <button class="back-btn" onclick="backToList()">← 返回</button>
    <button id="mode-btn" onclick="toggleMode()" style="background:none;border:1px solid rgba(255,255,255,0.4);color:white;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer">🎧 聆听</button>
    <div class="story-title" id="play-title">第1集</div>
    <div class="story-phase" id="play-phase">适应期</div>
  </div>
  <div class="story-progress"><div class="story-progress-fill" id="progress-fill"></div></div>
  <div class="loading-line" id="loading-line"><div class="loading-fill"></div></div>

  <!-- 重复设置 -->
  <div class="repeat-box">
    <div>
      <div class="repeat-label">🔁 重复播放</div>
      <div class="repeat-sub" id="repeat-sub">播完整集 1 次后停止</div>
    </div>
    <div class="repeat-ctrl">
      <button class="rep-btn" onclick="changeRepeat(-1)">−</button>
      <div class="rep-num" id="rep-num">1</div>
      <button class="rep-btn" onclick="changeRepeat(1)">+</button>
    </div>
  </div>

  <!-- 主播放卡片 -->
  <div class="story-player">
    <div class="seg-header">
      <div class="seg-role-icon" id="seg-icon">🎙️</div>
      <div>
        <div class="seg-role-name" id="seg-role">旁白</div>
        <div class="seg-role-badge badge-narrator" id="seg-badge">中文旁白</div>
      </div>
    </div>
    <div class="seg-text" id="seg-text">准备开始...</div>
    <div class="round-badge" id="round-badge"></div>
    <div class="wave-bar" id="wave-bar">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <div class="story-controls">
      <button class="ctrl-btn btn-prev" onclick="skipSeg(-1)">⏮</button>
      <button class="ctrl-btn btn-play" id="play-btn" onclick="togglePlay()">▶ 开始播放</button>
      <button class="ctrl-btn btn-next" onclick="skipSeg(1)">⏭</button>
    </div>
  </div>

  <!-- 只显示英语句子 -->
  <div class="en-list">
    <div class="en-list-title">🇺🇸 本集英语句子（点击跳转）</div>
    <div id="en-list"></div>
  </div>

  <div class="finish-card" id="finish-card">
    <div style="font-size:50px">🎉</div>
    <h3 id="finish-title">第1集完成！</h3>
    <p id="finish-msg">猫猫今天学会了打招呼！</p>
  </div>
  <div class="finish-review" id="finish-review" style="display:none">
    <div class="review-title">📚 今日英语回顾</div>
    <div id="review-list"></div>
    <div id="next-ep-bar" style="display:none;margin-top:20px;text-align:center;">
      <button id="next-ep-btn" style="background:#E87722;color:#fff;border:none;border-radius:24px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:320px;">
        ▶ 下一集
      </button>
      <div id="next-ep-count" style="margin-top:8px;color:#888;font-size:13px;"></div>
      <button id="next-ep-cancel" style="background:none;border:none;color:#aaa;font-size:12px;margin-top:4px;cursor:pointer;text-decoration:underline;">取消自动播放</button>
    </div>
  </div>
</div>


<script>
// ══ 故事数据 ══
const LESSONS = [
  {
    "id": 0,
    "title": "写给爸爸妈妈的话",
    "phase": "🌱 家长导读",
    "emotion": "在开始之前，先听我说几句",
    "review": [],
    "segments": [
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "这份导读，是写给爸爸妈妈的。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "猫猫是一只小花猫。第一天去幼儿园，他哭了，紧紧抱着妈妈的腿不肯松手。但是他还是走进去了。这个故事，就是从那一步开始的。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "这所幼儿园相信三件事。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "成长永远比结果重要。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "没有坏孩子，只有还没被理解的孩子。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "所有情绪都可以存在，都会慢慢过去。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "于是我们这样陪伴孩子——"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "朋友不是奖励，是一起长大的自然结果。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "英语就是生活的一部分，不是学习任务。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "古诗是猫猫理解世界的方法，不是背诵任务。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "每一个孩子都有自己的天赋，不需要比较。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "每一天都会比昨天长大一点点。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "原来，害怕也可以往前走。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "好了，现在让我们一起，去幼儿园门口，等猫猫。第一集，开始了。"
      }
    ],
    "phaseClass": "prologue",
    "color": "#E87722",
    "emoji": "🎙️"
  },
  {
    "id": 1,
    "title": "第一天到幼儿园门口",
    "phase": "适应期",
    "phaseClass": "phase1",
    "emoji": "🐱",
    "emotion": "😨 害怕 → 第一步勇气",
    "color": "#C8963A",
    "review": [
      {
        "zh": "我们到了",
        "en": "We are here."
      },
      {
        "zh": "早上好",
        "en": "Good morning."
      },
      {
        "zh": "我叫猫猫",
        "en": "My name is Maomao."
      },
      {
        "zh": "很高兴认识你",
        "en": "Nice to meet you."
      }
    ],
    "segments": [
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "今天的太阳，好像和平时一样。可是猫猫觉得，一点也不一样。因为今天，是他第一次去幼儿园。妈妈早早就起床了，给猫猫准备了他最喜欢的小书包——上面印着一辆橙色的小汽车。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "妈妈牵着猫猫走到幼儿园门口。猫猫的脚步越来越慢，走到门口，停下来了——他抱住妈妈的腿，不撒手。门口有好多小朋友，有的在笑，有的在跑，还有一个小朋友，正趴在妈妈身上哭。猫猫看着看着，嘴巴也扁了。"
      },
      {
        "role": "mum",
        "icon": "👩",
        "text": "猫猫，我们到了。用英语说就是——We are here. We are here，就是我们到了。来，跟妈妈说一遍。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "猫猫点点头，但还是抱着妈妈不撒手。眼泪已经跑到眼睛边了——马上就要哭出来了。"
      },
      {
        "role": "evan",
        "icon": "🐱",
        "text": "We are here!",
        "en": true
      },
      {
        "role": "evan",
        "icon": "🐱",
        "text": "妈妈……你也进去吧。"
      },
      {
        "role": "mum",
        "icon": "👩",
        "text": "妈妈在外面等你。猫猫进去，妈妈就在门口。"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "猫猫慢慢松开妈妈的腿，眼睛红红的，嘴巴还是扁着——就在这时，旁边传来一个声音——"
      },
      {
        "role": "koko",
        "icon": "🦘",
        "text": "你好你好！你也是今天第一天来吗？我叫可可，小袋鼠可可！我们做朋友吧！"
      },
      {
        "role": "narrator",
        "icon": "🎙️",
        "text": "猫猫抬起头——一只胖乎乎的小袋鼠，背着绿色的小书包，正对着他笑，笑得眼睛弯成了两道月亮。"
      },
      {

// iOS音频预解锁：第一次用户触摸时静默解锁Audio元素
function unlockIOSAudio(){
  if(audioUnlocked) return;
  const a = getSharedAudio();
  // 用最短的合法MP3来解锁（44字节的静音MP3）
  a.src = 'data:audio/mpeg;base64,/+MYxAANaAIQAAAAJHhBUgAAAAAA//MYxAYAAANIAAAAAMTEwNTEwNTEw//MYxAwAAANIAAAAAMTEwNTEwNTEw';
  const p = a.play();
  if(p) p.then(()=>{ a.pause(); a.src=''; audioUnlocked=true; }).catch(()=>{});
}
document.addEventListener('touchstart', unlockIOSAudio, {once:true, passive:true});
document.addEventListener('mousedown', unlockIOSAudio, {once:true});

function getSharedAudio(){
  if(!sharedAudio){
    sharedAudio = new Audio();
    sharedAudio.setAttribute('playsinline','');
    sharedAudio.setAttribute('webkit-playsinline','');
    sharedAudio.preload = 'auto';
  }
  return sharedAudio;
}

// ══ 播放状态 ══
let curLesson=null, segIdx=0, playing=false, busy=false;
let repeatTarget=1, curLoop=0;

async function azureTTS(text, isEn, role){
  const cacheKey=(isEn?'en:':'zh:')+text;
  if(audioCache[cacheKey]) return audioCache[cacheKey];
  const voice = isEn ? EN_VOICE : (VOICES[role]||VOICES.narrator).voice;
  const rate  = isEn ? '-5%'    : (VOICES[role]||VOICES.narrator).rate;
  const lang  = isEn ? 'en-US'  : 'zh-CN';
  const clean = text.replace(/[<>]/g,' ');
  const ssml=`<speak version='1.0' xml:lang='${lang}'><voice name='${voice}'><prosody rate='${rate}'>${clean}</prosody></voice></speak>`;
  const resp=await fetch(`https://${AZURE_REGION}.tts.speech.microsoft.com/cognitiveservices/v1`,{
    method:'POST',
    headers:{'Ocp-Apim-Subscription-Key':AZURE_KEY,'Content-Type':'application/ssml+xml','X-Microsoft-OutputFormat':'audio-16khz-128kbitrate-mono-mp3'},
    body:ssml
  });
  if(!resp.ok) throw new Error('TTS error '+resp.status);
  const buf=await resp.arrayBuffer();
  let url;
  // 统一用 Blob URL（iOS 13+已支持），iOS老版本降级到base64
  const blob = new Blob([buf], {type:'audio/mpeg'});
  try {
    url = URL.createObjectURL(blob);
  } catch(e) {
    // 极少数情况降级到base64
    const bytes=new Uint8Array(buf);
    let bin=''; for(let i=0;i<bytes.byteLength;i++) bin+=String.fromCharCode(bytes[i]);
    url='data:audio/mpeg;base64,'+btoa(bin);
  }
  audioCache[cacheKey]=url;
  return url;
}

function playOneAudio(url, onDone){
  const a = getSharedAudio();
  // 停掉之前的
  try{ a.pause(); }catch(e){}
  a.onended = null;
  a.onerror = null;
  a.ontimeupdate = null;
  currentAudio = a;

  let called = false;
  let safeTimer = setTimeout(function(){ done('safe30'); }, 30000);

  function done(reason){
    if(called) return;
    called = true;
    clearTimeout(safeTimer);
    a.onended = null;
    a.onerror = null;
    a.ontimeupdate = null;
    currentAudio = null;
    setTimeout(onDone, 50);
  }

  a.onended = function(){ done('ended'); };
  a.onerror = function(){ done('error'); };
  a.ontimeupdate = function(){
    if(a.duration && isFinite(a.duration) && !called){
      clearTimeout(safeTimer);
      const remaining = (a.duration - a.currentTime)*1000 + 1500;
      safeTimer = setTimeout(function(){ done('tu-safe'); }, remaining);
    }
  };

  a.src = url;
  // iOS：同一个Audio元素换src后直接play()，不需要重新解锁
  a.load(); // 确保加载
  const p = a.play();
  if(p) p.catch(function(e){
    console.warn('play()失败，重试:', e.name);
    // 重试一次
    setTimeout(function(){
      a.play().catch(function(e2){
        console.warn('重试失败:', e2.name);
        // 如果是NotAllowedError（需要用户手势），提示用户点击
        if(e2.name==='NotAllowedError'){
          const tip=document.createElement('div');
          tip.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;';
          tip.textContent='请点击屏幕任意位置以播放音频';
          document.body.appendChild(tip);
          setTimeout(()=>tip.remove(), 3000);
          document.addEventListener('touchstart', ()=>a.play().catch(()=>{}), {once:true});
        }
        done('play-fail');
      });
    }, 200);
  });
}

// 播放一个英文句子N遍，每遍之间停顿
function playEnTimes(url, times, onDone){
  if(!playing || times<=0){onDone();return;}
  playOneAudio(url, ()=>{
    if(!playing){onDone();return;}
    setTimeout(()=>playEnTimes(url, times-1, onDone), 500);
  });
}

function playCurrentSeg(){
  if(!playing||busy||!curLesson) return;
  if(segIdx>=curLesson.segments.length){
    // 一轮播完
    curLoop++;
    if(curLoop<repeatTarget){
      // 还有重复轮次，重新开始
      segIdx=0;
      updateSegDisplay();
      setTimeout(playCurrentSeg,800);
      return;
    }
    showFinish(); return;
  }
  busy=true;
  const s=curLesson.segments[segIdx];
  updateSegDisplay();
  document.getElementById('loading-line').classList.add('on');
  document.getElementById('wave-bar').classList.remove('playing');
  const isEn=!!s.en;
  
  azureTTS(s.text, isEn, s.role).then(url=>{
    document.getElementById('loading-line').classList.remove('on');
    if(!playing){busy=false;return;}
    document.getElementById('wave-bar').classList.add('playing');
    
    if(isEn){
      // 英文播放1遍（重复由段落数量自然控制）
      playEnTimes(url, 1, ()=>{
        busy=false;
        document.getElementById('wave-bar').classList.remove('playing');
        if(!playing) return;
        segIdx++;
        setTimeout(playCurrentSeg, 80);
      });
    } else {
      // 中文只播1遍，严格等完
      playOneAudio(url, ()=>{
        busy=false;
        document.getElementById('wave-bar').classList.remove('playing');
        if(!playing) return;
        segIdx++;
        setTimeout(playCurrentSeg, 80);
      });
    }
  }).catch(err=>{
    console.error('TTS错误:', err);
    document.getElementById('loading-line').classList.remove('on');
    busy=false;
    if(!playing) return;
    segIdx++;
    setTimeout(playCurrentSeg, 80);
  });
}

function togglePlay(){
  if(playing){
    playing=false; busy=false;
    if(currentAudio){try{currentAudio.pause();}catch(e){} currentAudio=null;}
    document.getElementById('wave-bar').classList.remove('playing');
    document.getElementById('loading-line').classList.remove('on');
    document.getElementById('play-btn').textContent='▶ 继续播放';

    playing=true;
    document.getElementById('play-btn').textContent='⏸ 暂停';

}

  const cancelBtn = document.getElementById('next-ep-cancel');

  // 清除上次倒计时
  if(window._autoNextTimer){ clearInterval(window._autoNextTimer); window._autoNextTimer=null; }

  if(curIdx >= 0 && curIdx < LESSONS.length - 1){
    const nextLesson = LESSONS[curIdx + 1];
    nextBtn.textContent = '▶ 下一集：第' + nextLesson.id + '集 · ' + nextLesson.title;
    nextBar.style.display = 'block';

    // 5秒倒计时自动跳转
    let countdown = 5;
    nextCount.textContent = countdown + ' 秒后自动播放下一集…';
    window._autoNextTimer = setInterval(function(){
      countdown--;
      if(countdown <= 0){
        clearInterval(window._autoNextTimer); window._autoNextTimer=null;
        nextBar.style.display='none';
        openLesson(curIdx + 1);
        setTimeout(function(){ togglePlay(); }, 400);
      } else {
        nextCount.textContent = countdown + ' 秒后自动播放下一集…';
      }
    }, 1000);

    // 手动点"下一集"
    nextBtn.onclick = function(){
      clearInterval(window._autoNextTimer); window._autoNextTimer=null;
      nextBar.style.display='none';
      openLesson(curIdx + 1);
      setTimeout(function(){ togglePlay(); }, 400);
    };

    // 取消自动播放
    cancelBtn.onclick = function(){
      clearInterval(window._autoNextTimer); window._autoNextTimer=null;
      nextCount.textContent = '已取消自动播放';
      cancelBtn.style.display = 'none';
    };
  } else {
    nextBar.style.display = 'none'; // 最后一集，不显示
  }
}

function backToList(){
  playing=false; busy=false;
  if(window._autoNextTimer){ clearInterval(window._autoNextTimer); window._autoNextTimer=null; }
  if(currentAudio){try{currentAudio.pause();}catch(e){} currentAudio=null;}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-list').classList.add('on');
  window.scrollTo(0,0);
}

// 微信检测
function isWechat(){
  return /MicroMessenger/i.test(navigator.userAgent);
}
function showLockedTip(){
  const tip = document.getElementById('locked-tip');
  if(tip){ tip.style.display='flex'; setTimeout(()=>tip.style.display='none',2500); }
}
// 模式切换
let listenMode = false;
function toggleMode(){
  listenMode = !listenMode;
  const btn = document.getElementById('mode-btn');
  const segBox = document.getElementById('seg-display');
  const enList = document.getElementById('en-list');
  if(listenMode){
    btn.textContent = '📖 阅读';
    btn.style.background = 'rgba(255,255,255,0.2)';
    if(segBox) segBox.style.display = 'none';
    if(enList) enList.parentElement.style.display = 'none';
  } else {
    btn.textContent = '🎧 聆听';
    btn.style.background = 'none';
    if(segBox) segBox.style.display = '';
    if(enList) enList.parentElement.style.display = '';
  }
}

function dismissTip(){
  document.getElementById('wechat-tip').style.display='none';
}
if(isWechat()){
  document.getElementById('wechat-tip').style.display='flex';
}

function changeRepeat(d){
  repeatTarget=Math.max(1,Math.min(20,repeatTarget+d));
  document.getElementById('rep-num').textContent=repeatTarget;
  document.getElementById('repeat-sub').textContent=
    repeatTarget===1?'播完整集 1 次后停止':'播完整集 '+repeatTarget+' 次后停止';
}

// 从 URL 参数读取解锁集数，默认只开放第1集
const urlParams = new URLSearchParams(window.location.search);
const unlockLevel = 21;

function renderList(){
  const el=document.getElementById('lesson-list');
  let html='';
  let lastPhase='';
  const phases={
    '适应期':'第一阶段 · 适应期（第1-5课）',
    '兴趣发现期':'第二阶段 · 兴趣发现期（第6-9课）',
    '归属感建立期':'第三阶段 · 归属感建立期（第10-13课）',
    '社交突破期':'第四阶段 · 社交突破期（第14-16课）',
    '独立稳定期':'第五阶段 · 独立稳定期（第17-18课）',
    '身份建立期':'第六阶段 · 身份建立期（第19-20集）',
  };
  LESSONS.forEach(l=>{
    if(l.phase!==lastPhase){
      html+=`<div class="phase-title">${phases[l.phase]||l.phase}</div>`;
      lastPhase=l.phase;
    }
    const isLocked = l.id > unlockLevel;
    html+=`<div class="lesson-card ${l.phaseClass}${isLocked?' locked-preview':''}" onclick="openLesson(${l.id})" style="${isLocked?'opacity:0.55':''}">
      <div class="lesson-num" style="background:${l.color}">${l.emoji}</div>
      <div class="lesson-info">
        <div class="name">${l.id===0?"导读":"第"+l.id+"集"} · ${l.title}</div>
        <div class="sub">${isLocked?'🔒 即将开放':(l.id===0?l.segments.length+'段 · 写给家长':''+l.segments.length+'段故事 · '+l.review.length+'句英语')}</div>
        <div class="emotion">${l.emotion}</div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function openLesson(idx){
  // 只有第1集开放，其余锁定
  if(idx >= unlockLevel){
    const card = document.querySelector('.lesson-card.locked-preview');
    showLockedTip();
    return;
  }
  curLesson=LESSONS[idx];
  segIdx=0; playing=false; busy=false; curLoop=0;
  if(currentAudio){try{currentAudio.pause();}catch(e){} currentAudio=null;}
  document.getElementById('play-title').textContent=(curLesson.id===0?'':('第'+curLesson.id+'集 · '))+curLesson.title;
  document.getElementById('play-phase').textContent=curLesson.phase;
  document.getElementById('play-btn').textContent='▶ 开始播放';
  document.getElementById('play-btn').className='ctrl-btn btn-play';
  document.getElementById('play-btn').onclick=togglePlay;
  document.getElementById('finish-card').classList.remove('show');
  document.getElementById('finish-review').style.display='none';
  document.getElementById('loading-line').classList.remove('on');
  document.getElementById('wave-bar').classList.remove('playing');
  document.getElementById('round-badge').textContent='';
  renderEnList();
  updateSegDisplay();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-play').classList.add('on');
  window.scrollTo(0,0);
}

function renderEnList(){
  const el=document.getElementById('en-list');
  if(!curLesson){el.innerHTML='';return;}
  let html='';
  const enSegs=curLesson.segments.map((s,i)=>({...s,origIdx:i})).filter(s=>s.en);
  const seen=new Set();
  enSegs.forEach((s,n)=>{
    const key=s.text.replace(/[.!?\s]/g,'').toLowerCase();
    const rev=curLesson.review.find(r=>{
      const enKey=r.en.replace(/[.!?\s]/g,'').toLowerCase();
      const segKey=s.text.replace(/[.!?\s]/g,'').toLowerCase();
      return enKey===segKey || segKey.includes(enKey) || enKey.includes(segKey);
    });
    const zh=rev?rev.zh:'';
    const displayKey=s.role+':'+key;
    if(seen.has(displayKey)) return;
    seen.add(displayKey);
    html+=`<div class="en-item" id="ei-${s.origIdx}" onclick="jumpTo(${s.origIdx})">
      <div class="en-item-num">${s.icon}</div>
      <div><div class="en-item-text">${s.text}</div>${zh?`<div class="en-item-zh">${zh}</div>`:''}</div>
    </div>`;
  });
  el.innerHTML=html||'<div style="color:var(--text2);font-size:13px;padding:8px 4px">本集暂无英文句子</div>';
}

function updateSegDisplay(){
  if(!curLesson) return;
  const idx=segIdx<curLesson.segments.length?segIdx:curLesson.segments.length-1;
  const s=curLesson.segments[idx];
  const r=ROLES[s.role]||ROLES.narrator;
  document.getElementById('seg-icon').textContent=s.icon||'🎙️';
  document.getElementById('seg-role').textContent=r.name;
  document.getElementById('seg-badge').textContent=r.badge;
  document.getElementById('seg-badge').className='seg-role-badge badge-'+r.class;
  const textEl=document.getElementById('seg-text');
  textEl.textContent=s.text;
  textEl.className='seg-text'+(s.en?' english':'')+(s.role==='narrator'?' narrator':'');
  const pct=Math.round((idx/curLesson.segments.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  const rb=document.getElementById('round-badge');
  if(repeatTarget>1){rb.textContent='第 '+(curLoop+1)+' / '+repeatTarget+' 轮';}
  else{rb.textContent='';}
  document.querySelectorAll('.en-item').forEach(el=>{
    const eidx=parseInt(el.id.replace('ei-',''));
    el.className='en-item'+(eidx===idx?' active':eidx<idx?' done':'');
  });
}


document.addEventListener("DOMContentLoaded", function(){
  renderList();
});
</script>
